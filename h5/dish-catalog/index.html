<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="description" content="门店菜品库公开展示" />
  <title>菜品库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1c2a22;
      --ink-soft: #4a5c52;
      --muted: #7a8a80;
      --paper: #f2f5f1;
      --paper-2: #e7eee8;
      --leaf: #2f6b4f;
      --leaf-deep: #1b4332;
      --leaf-soft: #d7e8dc;
      --accent: #c45c26;
      --line: rgba(28, 42, 34, 0.08);
      --shadow: 0 12px 40px rgba(27, 67, 50, 0.08);
      --radius: 18px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --header-h: 56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Outfit", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at 10% -10%, #dceade 0%, transparent 55%),
        radial-gradient(900px 420px at 100% 0%, #e8efe4 0%, transparent 50%),
        linear-gradient(180deg, #eef3ee 0%, var(--paper) 28%, #f7f8f5 100%);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; color: inherit; }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 0 16px 48px;
    }

    /* 顶栏 */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 -16px;
      padding: 0 16px;
      backdrop-filter: blur(14px);
      background: rgba(242, 245, 241, 0.82);
      border-bottom: 1px solid transparent;
      transition: border-color .25s ease, background .25s ease;
    }
    .topbar.is-scrolled {
      border-bottom-color: var(--line);
      background: rgba(242, 245, 241, 0.94);
    }
    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--leaf-soft);
      flex-shrink: 0;
    }
    .brand-mark.fallback {
      display: grid;
      place-items: center;
      color: var(--leaf-deep);
      font-family: "Fraunces", serif;
      font-weight: 700;
      font-size: 15px;
    }
    .brand-text { min-width: 0; flex: 1; }
    .brand-name {
      font-family: "Fraunces", Georgia, serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .brand-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* Hero：品牌主导 */
    .hero {
      position: relative;
      margin: 18px 0 22px;
      padding: 28px 22px 26px;
      border-radius: 28px;
      overflow: hidden;
      color: #f7faf7;
      background:
        linear-gradient(135deg, rgba(27, 67, 50, 0.92) 0%, rgba(47, 107, 79, 0.88) 48%, rgba(28, 58, 42, 0.94) 100%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      box-shadow: var(--shadow);
      animation: heroIn .7s ease both;
    }
    .hero::after {
      content: "";
      position: absolute;
      right: -40px;
      bottom: -50px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.16) 0%, transparent 68%);
      pointer-events: none;
    }
    .hero-kicker {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.78;
      margin-bottom: 10px;
    }
    .hero-title {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(28px, 7vw, 40px);
      font-weight: 700;
      line-height: 1.15;
      max-width: 14em;
      position: relative;
      z-index: 1;
    }
    .hero-desc {
      margin-top: 12px;
      font-size: 14px;
      max-width: 28em;
      opacity: 0.86;
      position: relative;
      z-index: 1;
    }
    .hero-meta {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      position: relative;
      z-index: 1;
    }
    .meta-chip {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
    }

    /* 工具条 */
    .toolbar {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
      position: sticky;
      top: var(--header-h);
      z-index: 30;
      padding: 10px 0 12px;
      background: linear-gradient(180deg, rgba(242,245,241,0.96) 60%, rgba(242,245,241,0));
    }
    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      box-shadow: 0 4px 16px rgba(27, 67, 50, 0.04);
    }
    .search svg { flex-shrink: 0; opacity: 0.55; }
    .search input {
      border: 0;
      outline: 0;
      background: transparent;
      width: 100%;
      font-size: 15px;
    }
    .search input::placeholder { color: var(--muted); }
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.7);
      color: var(--ink-soft);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s, transform .15s;
    }
    .filter-btn:active { transform: scale(0.97); }
    .filter-btn.is-active {
      background: var(--leaf-deep);
      border-color: var(--leaf-deep);
      color: #fff;
    }

    /* 列表 */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 4px 0 14px;
    }
    .section-title {
      font-family: "Fraunces", Georgia, serif;
      font-size: 20px;
      font-weight: 700;
    }
    .section-count { font-size: 13px; color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    @media (min-width: 720px) {
      .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    }
    @media (min-width: 980px) {
      .grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    .card {
      border: 0;
      background: rgba(255,255,255,0.72);
      border-radius: var(--radius);
      overflow: hidden;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 1px 0 var(--line);
      transition: transform .2s ease, box-shadow .2s ease;
      animation: cardIn .5s ease both;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .card:active { transform: translateY(0); }
    .card-media {
      position: relative;
      aspect-ratio: 1 / 1;
      background:
        linear-gradient(145deg, var(--paper-2), #dfe8e1);
      overflow: hidden;
    }
    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .45s ease;
    }
    .card:hover .card-media img { transform: scale(1.04); }
    .card-media .ph {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
    }
    .spice-badge {
      position: absolute;
      left: 8px;
      bottom: 8px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.92);
      color: var(--accent);
      backdrop-filter: blur(6px);
    }
    .card-body { padding: 12px 12px 14px; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.7em;
    }
    .card-tags {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 20px;
    }
    .tag {
      font-size: 11px;
      color: var(--leaf);
      background: var(--leaf-soft);
      padding: 2px 7px;
      border-radius: 6px;
    }
    .card-foot {
      margin-top: 10px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .price {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 700;
      color: var(--leaf-deep);
      font-size: 18px;
    }
    .price small { font-size: 12px; margin-right: 1px; }
    .price.pending {
      font-family: "Outfit", sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
    }
    .more { font-size: 12px; color: var(--muted); }

    /* 状态 */
    .state {
      padding: 48px 16px;
      text-align: center;
      color: var(--ink-soft);
    }
    .state-title {
      font-family: "Fraunces", Georgia, serif;
      font-size: 22px;
      margin-bottom: 8px;
      color: var(--ink);
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 14px;
      border: 2px solid var(--leaf-soft);
      border-top-color: var(--leaf);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .retry-btn {
      margin-top: 16px;
      border: 0;
      background: var(--leaf-deep);
      color: #fff;
      padding: 10px 18px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* 详情抽屉 */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(16, 28, 22, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }
    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }
    .sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 90;
      max-height: min(88vh, 760px);
      background: #fbfcf9;
      border-radius: 24px 24px 0 0;
      transform: translateY(110%);
      transition: transform .32s cubic-bezier(.2,.8,.2,1);
      display: flex;
      flex-direction: column;
      box-shadow: 0 -16px 48px rgba(16, 28, 22, 0.18);
    }
    .sheet.is-open { transform: translateY(0); }
    .sheet-handle {
      width: 42px;
      height: 4px;
      border-radius: 4px;
      background: rgba(28,42,34,0.16);
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .sheet-scroll {
      overflow: auto;
      padding: 12px 16px calc(24px + var(--safe-b));
      -webkit-overflow-scrolling: touch;
    }
    .sheet-media {
      border-radius: 18px;
      overflow: hidden;
      aspect-ratio: 16 / 11;
      background: var(--paper-2);
    }
    .sheet-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sheet-media .ph {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    .sheet-title {
      margin-top: 16px;
      font-family: "Fraunces", Georgia, serif;
      font-size: 26px;
      line-height: 1.2;
    }
    .sheet-price-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .sheet-price {
      font-family: "Fraunces", Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--leaf-deep);
    }
    .sheet-price small { font-size: 14px; }
    .sheet-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .sheet-desc {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--ink-soft);
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .sheet-desc.empty { color: var(--muted); }
    .sheet-close {
      position: absolute;
      right: 14px;
      top: 14px;
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      background: rgba(28,42,34,0.06);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      color: var(--ink-soft);
    }

    .footer-note {
      margin-top: 36px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes heroIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar" id="topbar">
      <div class="brand-mark fallback" id="storeLogo">OK</div>
      <div class="brand-text">
        <div class="brand-name" id="storeName">菜品库</div>
        <div class="brand-sub" id="storeSub">加载中…</div>
      </div>
    </header>

    <section class="hero" aria-label="品牌介绍">
      <div class="hero-kicker">Dish Catalog</div>
      <h1 class="hero-title" id="heroTitle">今日餐桌的灵感库</h1>
      <p class="hero-desc" id="heroDesc">浏览门店全部在售菜品与简介，无需登录即可查看。</p>
      <div class="hero-meta">
        <span class="meta-chip" id="metaCount">— 道菜品</span>
        <span class="meta-chip">公开浏览</span>
      </div>
    </section>

    <div class="toolbar">
      <label class="search" for="q">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input id="q" type="search" placeholder="搜索菜品名称或简介" autocomplete="off" />
      </label>
      <div class="filters" id="filters" role="tablist" aria-label="菜品分类"></div>
    </div>

    <div class="section-head">
      <h2 class="section-title">全部菜品</h2>
      <div class="section-count" id="visibleCount"></div>
    </div>

    <div id="content">
      <div class="state">
        <div class="spinner" aria-hidden="true"></div>
        <div class="state-title">正在准备菜单</div>
        <p>稍等片刻，马上呈现</p>
      </div>
    </div>

    <p class="footer-note">仅供浏览展示 · 下单请前往小程序</p>
  </div>

  <div class="overlay" id="overlay" hidden></div>
  <aside class="sheet" id="sheet" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle" aria-hidden="true"></div>
    <button type="button" class="sheet-close" id="sheetClose" aria-label="关闭">×</button>
    <div class="sheet-scroll" id="sheetBody"></div>
  </aside>

  <script>
    (function () {
      "use strict";

      const params = new URLSearchParams(location.search);
      const storeId = (params.get("store_id") || params.get("storeId") || "1").trim();
      const tenantId = (params.get("tenant_id") || params.get("tenantId") || "").trim();

      /** 同源优先；本地 file:// 或独立端口时可通过 ?api= 指定 API 根 */
      const apiRoot = (params.get("api") || "").replace(/\/$/, "") || "";

      const state = {
        items: [],
        filters: [],
        activeType: "all",
        query: "",
        storeName: "",
      };

      const els = {
        topbar: document.getElementById("topbar"),
        storeLogo: document.getElementById("storeLogo"),
        storeName: document.getElementById("storeName"),
        storeSub: document.getElementById("storeSub"),
        heroTitle: document.getElementById("heroTitle"),
        heroDesc: document.getElementById("heroDesc"),
        metaCount: document.getElementById("metaCount"),
        filters: document.getElementById("filters"),
        content: document.getElementById("content"),
        visibleCount: document.getElementById("visibleCount"),
        q: document.getElementById("q"),
        overlay: document.getElementById("overlay"),
        sheet: document.getElementById("sheet"),
        sheetBody: document.getElementById("sheetBody"),
        sheetClose: document.getElementById("sheetClose"),
      };

      function headers() {
        const h = { "X-Store-Id": storeId, Accept: "application/json" };
        if (tenantId) h["X-Tenant-Id"] = tenantId;
        return h;
      }

      async function apiGet(path) {
        const url = apiRoot + path;
        const res = await fetch(url, { headers: headers(), credentials: "omit" });
        const json = await res.json().catch(() => null);
        if (!res.ok || !json || json.code !== 200) {
          const msg = (json && json.msg) || ("请求失败 " + res.status);
          throw new Error(msg);
        }
        return json.data;
      }

      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function priceHtml(price, cls) {
        if (price == null || price === "") {
          return '<span class="' + (cls || "price") + ' pending">价格待公布</span>';
        }
        const n = Number(price);
        const text = Number.isFinite(n) ? (Number.isInteger(n) ? String(n) : n.toFixed(2)) : String(price);
        return '<span class="' + (cls || "price") + '"><small>¥</small>' + escapeHtml(text) + "</span>";
      }

      function imgTag(src, alt) {
        if (!src) return '<div class="ph">暂无图片</div>';
        return '<img src="' + escapeHtml(src) + '" alt="' + escapeHtml(alt || "") + '" loading="lazy" decoding="async" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'ph\',textContent:\'暂无图片\'}))" />';
      }

      function filteredItems() {
        const q = state.query.trim().toLowerCase();
        return state.items.filter(function (d) {
          if (state.activeType !== "all") {
            if (String(d.dish_type_category_id) !== String(state.activeType)) return false;
          }
          if (!q) return true;
          const hay = [d.title, d.desc, d.meat_category_name, d.dish_type_category_name]
            .filter(Boolean)
            .join(" ")
            .toLowerCase();
          return hay.indexOf(q) !== -1;
        });
      }

      function renderFilters() {
        const buttons = [{ id: "all", name: "全部" }].concat(state.filters || []);
        els.filters.innerHTML = buttons.map(function (f) {
          const active = String(state.activeType) === String(f.id) ? " is-active" : "";
          return '<button type="button" class="filter-btn' + active + '" data-type="' + escapeHtml(f.id) + '" role="tab" aria-selected="' + (active ? "true" : "false") + '">' + escapeHtml(f.name) + "</button>";
        }).join("");
      }

      function renderGrid() {
        const list = filteredItems();
        els.visibleCount.textContent = "显示 " + list.length + " / " + state.items.length;
        if (!list.length) {
          els.content.innerHTML = '<div class="state"><div class="state-title">没有匹配的菜品</div><p>换个关键词或分类试试</p></div>';
          return;
        }
        els.content.innerHTML = '<div class="grid" id="grid"></div>';
        const grid = document.getElementById("grid");
        const frag = document.createDocumentFragment();
        list.forEach(function (d, i) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "card";
          btn.style.animationDelay = Math.min(i * 0.03, 0.35) + "s";
          btn.setAttribute("data-id", String(d.dish_id));
          const tags = [];
          if (d.dish_type_category_name) tags.push(d.dish_type_category_name);
          if (d.meat_category_name) tags.push(d.meat_category_name);
          btn.innerHTML =
            '<div class="card-media">' +
              imgTag(d.pic_thumb || d.pic, d.title) +
              (d.spice_label ? '<span class="spice-badge">' + escapeHtml(d.spice_label) + "</span>" : "") +
            "</div>" +
            '<div class="card-body">' +
              '<div class="card-title">' + escapeHtml(d.title || "未命名菜品") + "</div>" +
              '<div class="card-tags">' + tags.map(function (t) { return '<span class="tag">' + escapeHtml(t) + "</span>"; }).join("") + "</div>" +
              '<div class="card-foot">' + priceHtml(d.price) + '<span class="more">详情</span></div>' +
            "</div>";
          frag.appendChild(btn);
        });
        grid.appendChild(frag);
      }

      function openSheet(dish) {
        const tags = [];
        if (dish.spice_label) tags.push(dish.spice_label);
        if (dish.dish_type_category_name) tags.push(dish.dish_type_category_name);
        if (dish.meat_category_name) tags.push(dish.meat_category_name);
        const desc = (dish.desc || "").trim();
        els.sheetBody.innerHTML =
          '<div class="sheet-media">' + imgTag(dish.pic || dish.pic_thumb, dish.title) + "</div>" +
          '<h2 class="sheet-title" id="sheetTitle">' + escapeHtml(dish.title || "未命名菜品") + "</h2>" +
          '<div class="sheet-price-row">' +
            priceHtml(dish.price, "sheet-price") +
            '<div class="sheet-tags">' + tags.map(function (t) { return '<span class="tag">' + escapeHtml(t) + "</span>"; }).join("") + "</div>" +
          "</div>" +
          '<div class="sheet-desc' + (desc ? "" : " empty") + '">' +
            (desc ? escapeHtml(desc) : "暂无更多介绍") +
          "</div>";

        els.overlay.hidden = false;
        requestAnimationFrame(function () {
          els.overlay.classList.add("is-open");
          els.sheet.classList.add("is-open");
          els.sheet.setAttribute("aria-hidden", "false");
          document.body.style.overflow = "hidden";
        });
      }

      function closeSheet() {
        els.overlay.classList.remove("is-open");
        els.sheet.classList.remove("is-open");
        els.sheet.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        setTimeout(function () {
          if (!els.sheet.classList.contains("is-open")) els.overlay.hidden = true;
        }, 280);
      }

      function applyStoreInfo(info) {
        if (!info) return;
        const name = info.store_name || "菜品库";
        state.storeName = name;
        els.storeName.textContent = name;
        document.title = name + " · 菜品库";
        els.heroTitle.textContent = name;
        els.heroDesc.textContent = "精选菜品与风味介绍，随时翻阅门店菜单灵感。";
        const logo = info.store_logo_thumb_url || info.store_logo_url;
        if (logo) {
          const img = document.createElement("img");
          img.className = "brand-mark";
          img.alt = name;
          img.src = logo;
          img.onerror = function () { /* keep fallback text */ };
          els.storeLogo.replaceWith(img);
          els.storeLogo = img;
        } else {
          els.storeLogo.textContent = (name.slice(0, 1) || "OK");
        }
      }

      async function boot() {
        els.storeSub.textContent = "门店 #" + storeId;
        try {
          const [catalog, storeInfo] = await Promise.all([
            apiGet("/api/menu/dishes"),
            apiGet("/api/home/store-info").catch(function () { return null; }),
          ]);
          applyStoreInfo(storeInfo);
          state.items = Array.isArray(catalog && catalog.items) ? catalog.items : [];
          state.filters = Array.isArray(catalog && catalog.dish_type_filters) ? catalog.dish_type_filters : [];
          const total = catalog && typeof catalog.total === "number" ? catalog.total : state.items.length;
          els.metaCount.textContent = total + " 道菜品";
          els.storeSub.textContent = total ? "共 " + total + " 道在售菜品" : "暂无在售菜品";
          renderFilters();
          renderGrid();
        } catch (err) {
          els.content.innerHTML =
            '<div class="state"><div class="state-title">加载失败</div><p>' +
            escapeHtml(err.message || "网络异常") +
            '</p><button type="button" class="retry-btn" id="retry">重新加载</button></div>';
          const retry = document.getElementById("retry");
          if (retry) retry.addEventListener("click", boot);
        }
      }

      els.filters.addEventListener("click", function (e) {
        const btn = e.target.closest(".filter-btn");
        if (!btn) return;
        state.activeType = btn.getAttribute("data-type") || "all";
        renderFilters();
        renderGrid();
      });

      els.content.addEventListener("click", function (e) {
        const card = e.target.closest(".card");
        if (!card) return;
        const id = card.getAttribute("data-id");
        const dish = state.items.find(function (d) { return String(d.dish_id) === String(id); });
        if (dish) openSheet(dish);
      });

      let qTimer = null;
      els.q.addEventListener("input", function () {
        clearTimeout(qTimer);
        qTimer = setTimeout(function () {
          state.query = els.q.value || "";
          renderGrid();
        }, 120);
      });

      els.overlay.addEventListener("click", closeSheet);
      els.sheetClose.addEventListener("click", closeSheet);
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeSheet();
      });

      window.addEventListener("scroll", function () {
        els.topbar.classList.toggle("is-scrolled", window.scrollY > 8);
      }, { passive: true });

      boot();
    })();
  </script>
</body>
</html>
