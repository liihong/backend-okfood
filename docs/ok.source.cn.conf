server {
    listen 443 ssl http2;
    server_name ok.sourcefire.cn;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    root /var/www/okfood/h5;   # 改为前端 build 上传目录
    index index.html;

    location / {
	  try_files $uri $uri/ /index.html;
	}

   location /admin{
   	root /var/www/okfood/backend/okfood-admin/dist;
	index index.html;
   }	
   location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      expires 7d;
      add_header Cache-Control "public, immutable";
  }
   location /api {
       proxy_pass http://127.0.0.1:8001;
       proxy_http_version 1.1;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
       proxy_read_timeout 300s;
  }
 
    ssl_certificate /etc/letsencrypt/live/ok.sourcefire.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ok.sourcefire.cn/privkey.pem; # managed by Certbot
}

server {
    if ($host = ok.sourcefire.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ok.sourcefire.cn;
    return 404; # managed by Certbot


}
